name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.12.2

# Ensure scripts are run with pipefail. See:
# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
defaults:
  run:
    shell: bash

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - run: go test ./...
      - run: go test -race ./...

      - run: git add .
      - run: git diff --staged --exit-code

      - name: Configure GOCACHEPROG
        run: |
          export GOBIN="$RUNNER_TEMP/bin"
          mkdir -p "$GOBIN"
          go install .
          echo "$GOBIN" >> "$GITHUB_PATH"
          echo "GOCACHEZ_DIR=$RUNNER_TEMP/gocachez" >> "$GITHUB_ENV"
          go env -w GOCACHE="$RUNNER_TEMP/go-build"
          go env -w GOCACHEPROG=gocachez

      - name: Smoke test std and cmd
        run: |
          go test -run '^$' -count=1 std cmd

      - uses: golangci/golangci-lint-action@db582008a42febd596419635a5abc9d9815daa9c # v9.2.1
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          cache: false

  format:
    name: format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - uses: dprint/check@9cb3a2b17a8e606d37aae341e49df3654933fc23 # v2.3

  required:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - format
      - test

    steps:
      - name: Check required jobs
        env:
          NEEDS: ${{ toJson(needs) }}
        run: |
          ! echo $NEEDS | jq -e 'to_entries[] | { job: .key, result: .value.result } | select((.result == "success" or .result == "skipped") | not)'
